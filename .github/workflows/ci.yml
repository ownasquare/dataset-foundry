name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check src tests scripts examples
      - run: uv run ruff format --check src tests scripts examples
      - run: uv run mypy src
      - run: uv run pytest -m "not live" --cov=dataset_foundry --cov-report=term-missing --cov-fail-under=80
      - run: uv run bandit -q -r src
      - run: uv run pip-audit
      - run: uv build
      - run: uv run python examples/custom_scorer.py
      - run: uv run python scripts/benchmark_scale.py --count 250
      - run: uv run python scripts/benchmark_durable.py --count 250

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm --prefix frontend ci
      - run: npm --prefix frontend run typecheck
      - run: npm --prefix frontend run build
      - run: npm --prefix frontend run test:component

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: uv sync --frozen
      - run: npm --prefix frontend ci
      - run: npm --prefix frontend exec -- playwright install --with-deps chromium
      - run: npm --prefix frontend run test:e2e

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - run: docker compose config --quiet
      - run: docker compose build
