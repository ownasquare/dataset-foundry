name: Bug report
description: Report a reproducible Dataset Foundry problem
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Do not include API keys, customer seeds, private prompts, databases, or exports.
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Docker quickstart
        - Python API or CLI
        - React workbench
        - Generation worker
        - Quality or similarity
        - Export or packaging
        - Live provider
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Safe reproduction
      description: List the smallest steps using synthetic or redacted data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python, browser, and Docker versions as relevant.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Data safety
      options:
        - label: I removed credentials, customer data, private prompts, databases, and exports.
          required: true
